
<style>
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
#erd{width:100%;}
#erd svg{width:100%!important;max-width:100%;}
</style>
<h2 class="sr-only">CCRIMS database schema — 13 tables with primary keys, foreign keys, and relationships shown as an entity-relationship diagram</h2>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '13px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a27' : '#f1efe8',
    primaryBorderColor: dark ? '#4a4844' : '#b4b2a9',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    secondaryColor: dark ? '#1e2a1e' : '#eaf3de',
    tertiaryColor: dark ? '#1e2430' : '#e6f1fb',
  },
});

const diagram = `erDiagram

  CITIZEN {
    char CitizenID PK
    string Fname
    string Lname
    string Email
    string NationalID
    string Phone
    string City
    string Password
  }

  STAFF {
    char StaffID PK
    string Fname
    string Lname
    enum Role
    string BadgeNumber
    string Department
    string Email
    string Password
  }

  CYBER_CRIME_TYPE {
    char CrimeTypeID PK
    string TypeName
    text Description
  }

  COMPLAINT {
    char ComplaintID PK
    text Description
    date LodgeDate
    enum Status
    char CitizenID FK
    char CrimeTypeID FK
  }

  CASE {
    char CaseID PK
    string CaseNumber
    text Description
    enum Status
    enum Priority
    date OpenDate
    date CloseDate
    string Jurisdiction
    char ComplaintID FK
  }

  CASE_STAFF {
    char CaseID FK
    char StaffID FK
    date AssignedDate
    string AssignmentRole
  }

  SUSPECT {
    char SuspectID PK
    string Fname
    string Lname
    string Alias
    string Phone
    string City
    string NationalID
    enum Status
  }

  CASE_SUSPECT {
    char CaseID FK
    char SuspectID FK
    string InvolvementType
  }

  DIGITAL_EVIDENCE {
    char EvidenceID PK
    string EvidenceType
    string FileName
    string FileHash
    string FileSize
    date CollectedDate
    text ChainOfCustody
    char CaseID FK
    char CollectedBy FK
  }

  CASE_RECORD {
    char RecordID PK
    date RecordDate
    text Summary
    char CaseID FK
    char StaffID FK
  }

  INVESTIGATION_LOG {
    char LogID PK
    string ActionType
    text ActionDetail
    datetime Timestamp
    char RecordID FK
    char StaffID FK
  }

  FORENSIC_REPORT {
    char RecordID PK
    string ReportType
    text Findings
    text ToolsUsed
    text Methodology
    date SubmittedDate
    char ExpertID FK
  }

  WARRANT {
    char WarrantID PK
    string WarrantType
    date IssuedDate
    date ExpiryDate
    string IssuedBy
    enum Status
    char CaseID FK
  }

  CITIZEN ||--o{ COMPLAINT : "lodges"
  CYBER_CRIME_TYPE ||--o{ COMPLAINT : "categorizes"
  COMPLAINT ||--|| CASE : "results in"
  CASE ||--o{ CASE_STAFF : "assigned to"
  STAFF ||--o{ CASE_STAFF : "works on"
  CASE ||--o{ CASE_SUSPECT : "involves"
  SUSPECT ||--o{ CASE_SUSPECT : "linked to"
  CASE ||--o{ DIGITAL_EVIDENCE : "has"
  STAFF ||--o{ DIGITAL_EVIDENCE : "collects"
  CASE ||--o{ CASE_RECORD : "has"
  STAFF ||--o{ CASE_RECORD : "creates"
  CASE_RECORD ||--|| FORENSIC_REPORT : "produces"
  CASE_RECORD ||--o{ INVESTIGATION_LOG : "logs"
  STAFF ||--o{ INVESTIGATION_LOG : "performs"
  STAFF ||--o{ FORENSIC_REPORT : "submits"
  CASE ||--o{ WARRANT : "issues"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke','none');
});
</script>
