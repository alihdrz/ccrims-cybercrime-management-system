
<style>
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
#erd{width:100%;}
#erd svg{width:100%!important;max-width:100%;}
</style>
<h2 class="sr-only">Cyber Crime Investigation Management System — full database schema ER diagram with 20 tables</h2>
<div id="erd"></div>
<script type="module">
import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';
const dark = matchMedia('(prefers-color-scheme: dark)').matches;
await document.fonts.ready;
mermaid.initialize({
  startOnLoad: false,
  theme: 'base',
  fontFamily: '"Anthropic Sans", sans-serif',
  themeVariables: {
    darkMode: dark,
    fontSize: '12px',
    fontFamily: '"Anthropic Sans", sans-serif',
    lineColor: dark ? '#9c9a92' : '#73726c',
    textColor: dark ? '#c2c0b6' : '#3d3d3a',
    primaryColor: dark ? '#2a2a27' : '#f1efe8',
    primaryBorderColor: dark ? '#4a4844' : '#b4b2a9',
    primaryTextColor: dark ? '#c2c0b6' : '#3d3d3a',
    secondaryColor: dark ? '#1e2a1e' : '#eaf3de',
    tertiaryColor: dark ? '#1e2430' : '#e6f1fb',
    nodeBorder: dark ? '#4a4844' : '#b4b2a9',
    clusterBkg: dark ? '#1e1e1b' : '#fafaf7',
  },
});

const diagram = `erDiagram

  CITIZEN {
    uuid CitizenID PK
    string Fname
    string Lname
    string Email
    string NationalID
  }
  CITIZEN_PHONE {
    uuid CitizenID FK
    string PhoneNo
  }
  ORGANIZATION {
    uuid OrgID PK
    string OrgName
    string Industry
    string ContactEmail
    string Street
    string ZipCode FK
  }
  ZIP_CODE {
    string ZipCode PK
    string City
    string State
    string Country
  }
  CYBER_CRIME_TYPE {
    uuid CrimeTypeID PK
    string TypeName
    string Description
  }
  COMPLAINT {
    uuid ComplaintID PK
    string Description
    date LodgeDate
    string Status
    uuid CitizenID FK
    uuid OrgID FK
    uuid CrimeTypeID FK
  }
  CASE {
    uuid CaseID PK
    string CaseNumber
    string Description
    string Status
    string Priority
    date OpenDate
    date CloseDate
    string Jurisdiction
    uuid ComplaintID FK
  }
  STAFF {
    uuid StaffID PK
    string Fname
    string Lname
    string Role
    string BadgeNumber
    string Department
    string Email
  }
  CASE_STAFF {
    uuid CaseID FK
    uuid StaffID FK
    date AssignedDate
    string Role
  }
  DEVICE {
    uuid DeviceID PK
    string DeviceType
    string Brand
    string Model
    string SerialNumber
    string OperatingSystem
    string MACAddress
    uuid CaseID FK
  }
  IP_ADDRESS {
    uuid IPID PK
    string IPAddress
    string IPType
    string ISP
    string Country
    uuid DeviceID FK
  }
  ONLINE_ACCOUNT {
    uuid AccountID PK
    string Platform
    string Username
    string Email
    string AccountType
    string Status
    uuid SuspectID FK
    uuid CitizenID FK
  }
  DIGITAL_EVIDENCE {
    uuid EvidenceID PK
    string EvidenceType
    string FileName
    string FileHash
    string FileSize
    string FilePath
    date CollectedDate
    uuid CollectedBy FK
    string ChainOfCustody
    uuid CaseID FK
  }
  MALWARE {
    uuid MalwareID PK
    string MalwareName
    string MalwareType
    string Hash
    string Signature
    string ThreatLevel
    uuid EvidenceID FK
  }
  CASE_RECORD {
    uuid RecordID PK
    date RecordDate
    string Summary
    uuid CaseID FK
    uuid StaffID FK
  }
  INVESTIGATION_LOG {
    uuid LogID PK
    string ActionType
    string ActionDetail
    datetime Timestamp
    uuid RecordID FK
    uuid StaffID FK
  }
  FORENSIC_REPORT {
    uuid ReportID PK
    string ReportType
    string Findings
    string ToolsUsed
    string Methodology
    date SubmittedDate
    uuid RecordID FK
    uuid ExpertID FK
  }
  SUSPECT {
    uuid SuspectID PK
    string Fname
    string Lname
    string Alias
    string Street
    string ZipCode FK
    string NationalID
    string Status
  }
  SUSPECT_PHONE {
    uuid SuspectID FK
    string PhoneNo
  }
  CASE_SUSPECT {
    uuid CaseID FK
    uuid SuspectID FK
    string InvolvementType
  }
  WARRANT {
    uuid WarrantID PK
    string WarrantType
    date IssuedDate
    date ExpiryDate
    string IssuedBy
    string Status
    uuid CaseID FK
  }

  CITIZEN ||--o{ CITIZEN_PHONE : "has"
  CITIZEN ||--o{ COMPLAINT : "lodges"
  ORGANIZATION ||--o{ COMPLAINT : "lodges"
  ORGANIZATION }o--|| ZIP_CODE : "located in"
  CYBER_CRIME_TYPE ||--o{ COMPLAINT : "categorizes"
  COMPLAINT ||--|| CASE : "results in"
  CASE ||--o{ CASE_STAFF : "assigned to"
  STAFF ||--o{ CASE_STAFF : "works on"
  CASE ||--o{ DEVICE : "involves"
  DEVICE ||--o{ IP_ADDRESS : "has"
  CASE ||--o{ DIGITAL_EVIDENCE : "contains"
  DIGITAL_EVIDENCE ||--o{ MALWARE : "contains"
  STAFF ||--o{ DIGITAL_EVIDENCE : "collects"
  CASE ||--o{ CASE_RECORD : "has"
  STAFF ||--o{ CASE_RECORD : "creates"
  CASE_RECORD ||--o{ INVESTIGATION_LOG : "logs"
  STAFF ||--o{ INVESTIGATION_LOG : "performs"
  CASE_RECORD ||--o{ FORENSIC_REPORT : "produces"
  STAFF ||--o{ FORENSIC_REPORT : "submits"
  SUSPECT ||--o{ SUSPECT_PHONE : "has"
  SUSPECT }o--|| ZIP_CODE : "located in"
  SUSPECT ||--o{ ONLINE_ACCOUNT : "uses"
  CITIZEN ||--o{ ONLINE_ACCOUNT : "owns"
  CASE ||--o{ CASE_SUSPECT : "involves"
  SUSPECT ||--o{ CASE_SUSPECT : "involved in"
  CASE ||--o{ WARRANT : "issues"
`;

const { svg } = await mermaid.render('erd-svg', diagram);
document.getElementById('erd').innerHTML = svg;

document.querySelectorAll('#erd svg .node').forEach(node => {
  const firstPath = node.querySelector('path[d]');
  if (!firstPath) return;
  const d = firstPath.getAttribute('d');
  const nums = d.match(/-?[\d.]+/g)?.map(Number);
  if (!nums || nums.length < 8) return;
  const xs = [nums[0], nums[2], nums[4], nums[6]];
  const ys = [nums[1], nums[3], nums[5], nums[7]];
  const x = Math.min(...xs), y = Math.min(...ys);
  const w = Math.max(...xs) - x, h = Math.max(...ys) - y;
  const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
  rect.setAttribute('x', x); rect.setAttribute('y', y);
  rect.setAttribute('width', w); rect.setAttribute('height', h);
  rect.setAttribute('rx', '8');
  for (const a of ['fill','stroke','stroke-width','class','style']) {
    if (firstPath.hasAttribute(a)) rect.setAttribute(a, firstPath.getAttribute(a));
  }
  firstPath.replaceWith(rect);
});

document.querySelectorAll('#erd svg .row-rect-odd path, #erd svg .row-rect-even path').forEach(p => {
  p.setAttribute('stroke','none');
});
</script>
